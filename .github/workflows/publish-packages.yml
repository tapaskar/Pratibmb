name: Publish Package Manifests

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.3)'
        required: true

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          TAG="${RELEASE_TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # List actual asset filenames from this release
          gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' > assets.txt
          cat assets.txt

      - name: Download macOS release assets
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          # Download by pattern — works regardless of version in filename
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*_aarch64.dmg" --output arm64.dmg
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*_x64.dmg" --output x64.dmg

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(sha256sum arm64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Detect file version from assets
        id: filever
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          # Extract the version number from the actual asset filename
          # e.g. "Pratibmb_0.2.0_aarch64.dmg" → "0.2.0"
          FILE_VER=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[].name' | grep '_aarch64.dmg' | sed 's/Pratibmb_\(.*\)_aarch64.dmg/\1/')
          echo "version=$FILE_VER" >> "$GITHUB_OUTPUT"
          echo "Detected file version: $FILE_VER"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: tapaskar/homebrew-pratibmb
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: tap

      - name: Update Cask formula
        run: |
          FILE_VER="${{ steps.filever.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.arm64 }}"
          SHA_X64="${{ steps.sha.outputs.x64 }}"

          cat > tap/Casks/pratibmb.rb << RUBY
          cask "pratibmb" do
            version "$FILE_VER"

            on_arm do
              url "https://github.com/tapaskar/Pratibmb/releases/latest/download/Pratibmb_#{version}_aarch64.dmg"
              sha256 "$SHA_ARM"
            end

            on_intel do
              url "https://github.com/tapaskar/Pratibmb/releases/latest/download/Pratibmb_#{version}_x64.dmg"
              sha256 "$SHA_X64"
            end

            name "Pratibmb"
            desc "Chat with your 10-years-younger self. 100% local, no cloud, no telemetry"
            homepage "https://pratibmb.com"

            app "Pratibmb.app"

            caveats <<~EOS
              Pratibmb requires Python 3.10+ to be installed on your system.

              On first launch, Pratibmb downloads ~2.5GB of AI models.
              After that, it works fully offline — no internet required.

              Optional fine-tuning (Apple Silicon):
                pip install mlx-lm
            EOS
          end
          RUBY

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update to ${{ steps.release.outputs.tag }}"
          git push

  update-aur:
    name: Update AUR Package
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download Linux release asset
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*_amd64.AppImage" --output appimage

      - name: Compute SHA256
        id: sha
        run: echo "appimage=$(sha256sum appimage | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Detect file version from assets
        id: filever
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          FILE_VER=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[].name' | grep '_amd64.AppImage' | sed 's/Pratibmb_\(.*\)_amd64.AppImage/\1/')
          echo "version=$FILE_VER" >> "$GITHUB_OUTPUT"
          echo "Detected file version: $FILE_VER"

      - name: Checkout AUR repo
        uses: actions/checkout@v4
        with:
          repository: tapaskar/pratibmb-aur
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: aur

      - name: Update PKGBUILD
        run: |
          FILE_VER="${{ steps.filever.outputs.version }}"
          SHA="${{ steps.sha.outputs.appimage }}"

          sed -i "s/^pkgver=.*/pkgver=$FILE_VER/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA'/" aur/PKGBUILD

          # Update source URL to use /latest/download/
          sed -i "s|source=(\".*AppImage|source=(\"pratibmb-bin-\${pkgver}.AppImage::https://github.com/tapaskar/Pratibmb/releases/latest/download/Pratibmb_\${pkgver}_amd64.AppImage|" aur/PKGBUILD

          # Regenerate .SRCINFO
          cat > aur/.SRCINFO << EOF
          pkgbase = pratibmb-bin
          	pkgdesc = Chat with your 10-years-younger self. 100% local, no cloud, no telemetry
          	pkgver = $FILE_VER
          	pkgrel = 1
          	url = https://pratibmb.com
          	arch = x86_64
          	license = AGPL-3.0-or-later
          	depends = python>=3.10
          	depends = fuse2
          	provides = pratibmb
          	conflicts = pratibmb
          	options = !strip
          	source = pratibmb-bin-${FILE_VER}.AppImage::https://github.com/tapaskar/Pratibmb/releases/latest/download/Pratibmb_${FILE_VER}_amd64.AppImage
          	source = pratibmb.desktop
          	sha256sums = $SHA
          	sha256sums = SKIP

          pkgname = pratibmb-bin
          EOF

      - name: Commit and push
        working-directory: aur
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update to ${{ steps.release.outputs.tag }}"
          git push

  update-winget:
    name: Update Winget Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download Windows release assets
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*_x64-setup.exe" --output setup.exe
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*_x64_en-US.msi" --output setup.msi

      - name: Compute SHA256
        id: sha
        run: |
          echo "exe=$(sha256sum setup.exe | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "msi=$(sha256sum setup.msi | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Detect file version from assets
        id: filever
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          FILE_VER=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[].name' | grep '_x64-setup.exe' | sed 's/Pratibmb_\(.*\)_x64-setup.exe/\1/')
          echo "version=$FILE_VER" >> "$GITHUB_OUTPUT"
          echo "Detected file version: $FILE_VER"

      - name: Checkout winget repo
        uses: actions/checkout@v4
        with:
          repository: tapaskar/pratibmb-winget
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: winget

      - name: Update manifests
        run: |
          FILE_VER="${{ steps.filever.outputs.version }}"
          SHA_EXE="${{ steps.sha.outputs.exe }}"
          SHA_MSI="${{ steps.sha.outputs.msi }}"
          MANIFEST_DIR="winget/manifests/t/tapaskar/Pratibmb/$FILE_VER"

          mkdir -p "$MANIFEST_DIR"

          cat > "$MANIFEST_DIR/tapaskar.Pratibmb.yaml" << EOF
          PackageIdentifier: tapaskar.Pratibmb
          PackageVersion: $FILE_VER
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          cat > "$MANIFEST_DIR/tapaskar.Pratibmb.installer.yaml" << EOF
          PackageIdentifier: tapaskar.Pratibmb
          PackageVersion: $FILE_VER
          Installers:
            - Architecture: x64
              InstallerType: nullsoft
              InstallerUrl: https://github.com/tapaskar/Pratibmb/releases/latest/download/Pratibmb_${FILE_VER}_x64-setup.exe
              InstallerSha256: $SHA_EXE
              InstallerSwitches:
                Silent: /S
                SilentWithProgress: /S
            - Architecture: x64
              InstallerType: msi
              InstallerUrl: https://github.com/tapaskar/Pratibmb/releases/latest/download/Pratibmb_${FILE_VER}_x64_en-US.msi
              InstallerSha256: $SHA_MSI
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

          cat > "$MANIFEST_DIR/tapaskar.Pratibmb.locale.en-US.yaml" << EOF
          PackageIdentifier: tapaskar.Pratibmb
          PackageVersion: $FILE_VER
          PackageLocale: en-US
          Publisher: tapaskar
          PublisherUrl: https://pratibmb.com
          PackageName: Pratibmb
          PackageUrl: https://pratibmb.com
          License: AGPL-3.0-or-later
          LicenseUrl: https://github.com/tapaskar/Pratibmb/blob/main/LICENSE
          ShortDescription: Chat with your 10-years-younger self. 100% local, no cloud, no telemetry.
          Tags:
            - chat
            - privacy
            - local
            - ai
            - llm
            - offline
            - messaging
            - personal
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

      - name: Commit and push
        working-directory: winget
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update to ${{ steps.release.outputs.tag }}"
          git push
