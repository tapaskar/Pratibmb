name: Publish Package Manifests

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS release assets
        run: |
          curl -fSL -o arm64.dmg "https://github.com/tapaskar/Pratibmb/releases/download/v${{ steps.version.outputs.version }}/Pratibmb_${{ steps.version.outputs.version }}_aarch64.dmg"
          curl -fSL -o x64.dmg "https://github.com/tapaskar/Pratibmb/releases/download/v${{ steps.version.outputs.version }}/Pratibmb_${{ steps.version.outputs.version }}_x64.dmg"

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(sha256sum arm64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: tapaskar/homebrew-pratibmb
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: tap

      - name: Update Cask formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.arm64 }}"
          SHA_X64="${{ steps.sha.outputs.x64 }}"

          cat > tap/Casks/pratibmb.rb << 'RUBY'
          cask "pratibmb" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              url "https://github.com/tapaskar/Pratibmb/releases/download/v#{version}/Pratibmb_#{version}_aarch64.dmg"
              sha256 "SHA_ARM_PLACEHOLDER"
            end

            on_intel do
              url "https://github.com/tapaskar/Pratibmb/releases/download/v#{version}/Pratibmb_#{version}_x64.dmg"
              sha256 "SHA_X64_PLACEHOLDER"
            end

            name "Pratibmb"
            desc "Chat with your 10-years-younger self. 100% local, no cloud, no telemetry"
            homepage "https://pratibmb.com"

            app "Pratibmb.app"

            caveats <<~EOS
              Pratibmb requires Python 3.10+ to be installed on your system.

              On first launch, Pratibmb downloads ~2.5GB of AI models.
              After that, it works fully offline — no internet required.

              Optional fine-tuning (Apple Silicon):
                pip install mlx-lm
            EOS
          end
          RUBY

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" tap/Casks/pratibmb.rb
          sed -i "s/SHA_ARM_PLACEHOLDER/$SHA_ARM/g" tap/Casks/pratibmb.rb
          sed -i "s/SHA_X64_PLACEHOLDER/$SHA_X64/g" tap/Casks/pratibmb.rb

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.version }}"
          git push

  update-aur:
    name: Update AUR Package
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux release asset
        run: |
          curl -fSL -o appimage "https://github.com/tapaskar/Pratibmb/releases/download/v${{ steps.version.outputs.version }}/Pratibmb_${{ steps.version.outputs.version }}_amd64.AppImage"

      - name: Compute SHA256
        id: sha
        run: echo "appimage=$(sha256sum appimage | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout AUR repo
        uses: actions/checkout@v4
        with:
          repository: tapaskar/pratibmb-aur
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: aur

      - name: Update PKGBUILD
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.appimage }}"

          sed -i "s/^pkgver=.*/pkgver=$VERSION/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD
          sed -i "s|sha256sums=('SKIP'|sha256sums=('$SHA'|" aur/PKGBUILD

          # Regenerate .SRCINFO
          cat > aur/.SRCINFO << EOF
          pkgbase = pratibmb-bin
          	pkgdesc = Chat with your 10-years-younger self. 100% local, no cloud, no telemetry
          	pkgver = $VERSION
          	pkgrel = 1
          	url = https://pratibmb.com
          	arch = x86_64
          	license = AGPL-3.0-or-later
          	depends = python>=3.10
          	depends = fuse2
          	provides = pratibmb
          	conflicts = pratibmb
          	options = !strip
          	source = pratibmb-bin-${VERSION}.AppImage::https://github.com/tapaskar/Pratibmb/releases/download/v${VERSION}/Pratibmb_${VERSION}_amd64.AppImage
          	source = pratibmb.desktop
          	sha256sums = $SHA
          	sha256sums = SKIP

          pkgname = pratibmb-bin
          EOF

      - name: Commit and push
        working-directory: aur
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.version }}"
          git push

  update-winget:
    name: Update Winget Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Windows release assets
        run: |
          curl -fSL -o setup.exe "https://github.com/tapaskar/Pratibmb/releases/download/v${{ steps.version.outputs.version }}/Pratibmb_${{ steps.version.outputs.version }}_x64-setup.exe"
          curl -fSL -o setup.msi "https://github.com/tapaskar/Pratibmb/releases/download/v${{ steps.version.outputs.version }}/Pratibmb_${{ steps.version.outputs.version }}_x64_en-US.msi"

      - name: Compute SHA256
        id: sha
        run: |
          echo "exe=$(sha256sum setup.exe | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "msi=$(sha256sum setup.msi | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout winget repo
        uses: actions/checkout@v4
        with:
          repository: tapaskar/pratibmb-winget
          token: ${{ secrets.DIST_REPO_TOKEN }}
          path: winget

      - name: Update manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_EXE="${{ steps.sha.outputs.exe }}"
          SHA_MSI="${{ steps.sha.outputs.msi }}"
          MANIFEST_DIR="winget/manifests/t/tapaskar/Pratibmb/$VERSION"

          mkdir -p "$MANIFEST_DIR"

          cat > "$MANIFEST_DIR/tapaskar.Pratibmb.yaml" << EOF
          PackageIdentifier: tapaskar.Pratibmb
          PackageVersion: $VERSION
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          cat > "$MANIFEST_DIR/tapaskar.Pratibmb.installer.yaml" << EOF
          PackageIdentifier: tapaskar.Pratibmb
          PackageVersion: $VERSION
          Installers:
            - Architecture: x64
              InstallerType: nullsoft
              InstallerUrl: https://github.com/tapaskar/Pratibmb/releases/download/v${VERSION}/Pratibmb_${VERSION}_x64-setup.exe
              InstallerSha256: $SHA_EXE
              InstallerSwitches:
                Silent: /S
                SilentWithProgress: /S
            - Architecture: x64
              InstallerType: msi
              InstallerUrl: https://github.com/tapaskar/Pratibmb/releases/download/v${VERSION}/Pratibmb_${VERSION}_x64_en-US.msi
              InstallerSha256: $SHA_MSI
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

          cat > "$MANIFEST_DIR/tapaskar.Pratibmb.locale.en-US.yaml" << EOF
          PackageIdentifier: tapaskar.Pratibmb
          PackageVersion: $VERSION
          PackageLocale: en-US
          Publisher: tapaskar
          PublisherUrl: https://pratibmb.com
          PackageName: Pratibmb
          PackageUrl: https://pratibmb.com
          License: AGPL-3.0-or-later
          LicenseUrl: https://github.com/tapaskar/Pratibmb/blob/main/LICENSE
          ShortDescription: Chat with your 10-years-younger self. 100% local, no cloud, no telemetry.
          Tags:
            - chat
            - privacy
            - local
            - ai
            - llm
            - offline
            - messaging
            - personal
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

      - name: Commit and push
        working-directory: winget
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.version }}"
          git push
