name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build desktop app
        working-directory: desktop/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload artifacts (macOS .dmg)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Pratibmb-${{ matrix.label }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Verify artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== Built artifact sizes (macOS) ==="
          ls -lh desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          for f in desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            size=$(stat -f%z "$f" 2>/dev/null || stat --format=%s "$f")
            if [ "$size" -lt 1000000 ]; then
              echo "ERROR: $f is only $size bytes — expected at least 1MB"
              exit 1
            fi
          done

      - name: Upload artifacts (Linux .deb + .AppImage)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Pratibmb-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Verify artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== Built artifact sizes (Linux) ==="
          ls -lh desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          ls -lh desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          for f in desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb \
                   desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage; do
            size=$(stat --format=%s "$f")
            if [ "$size" -lt 1000000 ]; then
              echo "ERROR: $f is only $size bytes — expected at least 1MB"
              exit 1
            fi
          done

      - name: Upload artifacts (Windows .msi + .exe)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Pratibmb-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Verify artifacts (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "=== Built artifact sizes (Windows) ==="
          Get-ChildItem "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" | ForEach-Object {
            Write-Host "$($_.Name): $([math]::Round($_.Length / 1MB, 2)) MB"
            if ($_.Length -lt 1MB) { throw "$($_.Name) is only $($_.Length) bytes - expected at least 1MB" }
          }
          Get-ChildItem "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | ForEach-Object {
            Write-Host "$($_.Name): $([math]::Round($_.Length / 1MB, 2)) MB"
            if ($_.Length -lt 1MB) { throw "$($_.Name) is only $($_.Length) bytes - expected at least 1MB" }
          }

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          draft: true
          generate_release_notes: true
