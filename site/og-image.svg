<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e4de"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#c4956a" opacity="0.6"/>
  <!-- Logo circle -->
  <circle cx="600" cy="180" r="60" fill="none" stroke="#c4956a" stroke-width="3" opacity="0.4"/>
  <text x="600" y="200" text-anchor="middle" fill="#c4956a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="300">P</text>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" fill="url(#accent)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="600">Chat with your 10-years-younger self.</text>
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" fill="#8a847a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="300">Import your messaging history. Text past-you. 100% local.</text>
  <!-- Badges -->
  <rect x="310" y="420" width="120" height="34" rx="17" fill="#1a1a1a" stroke="#2a2725"/>
  <text x="370" y="442" text-anchor="middle" fill="#8a847a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13">100% local</text>
  <rect x="450" y="420" width="110" height="34" rx="17" fill="#1a1a1a" stroke="#2a2725"/>
  <text x="505" y="442" text-anchor="middle" fill="#8a847a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13">no cloud</text>
  <rect x="580" y="420" width="140" height="34" rx="17" fill="#1a1a1a" stroke="#2a2725"/>
  <text x="650" y="442" text-anchor="middle" fill="#8a847a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13">no telemetry</text>
  <rect x="740" y="420" width="150" height="34" rx="17" fill="#1a1a1a" stroke="#2a2725"/>
  <text x="815" y="442" text-anchor="middle" fill="#8a847a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13">open source</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" fill="#c4956a" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="600">pratibmb.com</text>
</svg>
