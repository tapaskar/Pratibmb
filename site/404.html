<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — Pratibmb</title>
<meta name="description" content="The page you were looking for doesn't exist. Return to pratibmb.com.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --bg-2: #1a1a1a;
  --fg: #e8e4de;
  --fg-muted: #8a847a;
  --accent: #c4956a;
  --accent-2: #d4a87f;
  --border: rgba(196,149,106,0.18);
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(196,149,106,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(196,149,106,0.06) 0%, transparent 50%);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}
.code {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 28px;
}
h1 {
  font-family: var(--serif);
  font-size: clamp(56px, 14vw, 140px);
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: -0.04em;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sub {
  font-family: var(--serif);
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 400;
  font-style: italic;
  color: var(--fg);
  margin-bottom: 24px;
  letter-spacing: -0.01em;
}
.desc {
  max-width: 520px;
  color: var(--fg-muted);
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 40px;
}
.cta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 8px;
  text-decoration: none;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.btn-primary {
  background: var(--accent);
  color: #1a0f0a;
  text-shadow: 0 1px 1px rgba(0,0,0,0.1);
  box-shadow: 0 4px 14px rgba(196,149,106,0.28), inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:hover {
  background: var(--accent-2);
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(196,149,106,0.4);
}
.btn-ghost {
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: rgba(196,149,106,0.08);
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
}
.suggest {
  margin-top: 56px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1.5px;
  color: var(--fg-muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px 28px;
}
.links a {
  color: var(--accent);
  font-size: 14px;
  text-decoration: none;
  transition: color 0.15s ease;
}
.links a:hover {
  color: var(--accent-2);
  text-decoration: underline;
}
</style>
</head>
<body>
  <div class="code">Error 404</div>
  <h1>404</h1>
  <div class="sub">This page doesn't exist.</div>
  <p class="desc">
    You may have followed a broken link, mistyped a URL, or the page has moved.
    Everything you can reach from here is below.
  </p>
  <div class="cta">
    <a href="/" class="btn btn-primary">Return home &rarr;</a>
    <a href="/clinical/" class="btn btn-ghost">Pratibmb Clinical</a>
  </div>
  <div class="suggest">Popular destinations</div>
  <div class="links">
    <a href="/">Home</a>
    <a href="/#how">How it works</a>
    <a href="/#downloads">Download</a>
    <a href="/#privacy">Privacy</a>
    <a href="/#faq">FAQ</a>
    <a href="/clinical/">For clinicians</a>
    <a href="/clinical/blog/">Research notes</a>
    <a href="https://github.com/tapaskar/Pratibmb">GitHub</a>
  </div>
</body>
</html>
